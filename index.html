    <meta charset="UTF-8" />

    <title>Lila Sitter | Conscious Care</title>
    
    <!-- FAVICON SETTINGS - FORCED REFRESH -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://i.ibb.co/b55ZfcbK/nano-banana-2025-12-02-T02-50-40.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="https://i.ibb.co/b55ZfcbK/nano-banana-2025-12-02-T02-50-40.png" />
    <link rel="shortcut icon" type="image/png" href="https://i.ibb.co/b55ZfcbK/nano-banana-2025-12-02-T02-50-40.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
              serif: ['Playfair Display', 'Noto Serif SC', 'serif'],
            },
            colors: {
              forest: {
                950: '#0a120d', // Deepest organic black
                900: '#132018', // Night forest
                800: '#1f3326', // Deep leaf
                700: '#2e4535',
              },
              moss: {
                500: '#5c6b4e', // Vitality
                600: '#4a5d42',
              },
              sky: {
                800: '#2c3a40', // Deep consciousness sky
                900: '#1d2629',
              },
              earth: {
                300: '#d4c5a3', // Light Clay / Gold (Highlights)
                400: '#b0a080', // Warm earth
                500: '#8c7b64', // Wet soil
              },
              mist: {
                100: '#f0f2f0',
                200: '#e0e5e2',
              }
            },
            animation: {
              'fade-in': 'fadeIn 1.2s ease-out forwards',
              'breath': 'breath 8s ease-in-out infinite',
              'mist-drift': 'mistDrift 20s linear infinite alternate',
              'leaf-float': 'leafFloat 12s ease-in-out infinite',
              'blob-slow': 'blob 25s infinite alternate',
              'blob-rev': 'blobReverse 20s infinite alternate',
              'float-up': 'floatUp 15s infinite linear',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(15px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              breath: {
                '0%, 100%': { opacity: '0.6' },
                '50%': { opacity: '0.9' },
              },
              mistDrift: {
                '0%': { transform: 'translateX(-5%)' },
                '100%': { transform: 'translateX(5%)' },
              },
              leafFloat: {
                '0%, 100%': { transform: 'translate(0, 0) rotate(0deg)' },
                '25%': { transform: 'translate(15px, -20px) rotate(10deg)' },
                '50%': { transform: 'translate(-5px, -35px) rotate(-5deg)' },
                '75%': { transform: 'translate(-20px, -15px) rotate(5deg)' },
              },
              blob: {
                '0%': { transform: 'translate(0, 0) scale(1)' },
                '33%': { transform: 'translate(50px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0, 0) scale(1)' },
              },
              blobReverse: {
                '0%': { transform: 'translate(0, 0) scale(1)' },
                '33%': { transform: 'translate(-50px, 50px) scale(1.1)' },
                '66%': { transform: 'translate(30px, -30px) scale(0.9)' },
                '100%': { transform: 'translate(0, 0) scale(1)' },
              },
              floatUp: {
                '0%': { transform: 'translateY(100vh) translateX(0)', opacity: '0' },
                '20%': { opacity: '0.6' },
                '80%': { opacity: '0.6' },
                '100%': { transform: 'translateY(-20vh) translateX(20px)', opacity: '0' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        scroll-behavior: smooth;
        background-color: #0a120d;
        color: #e0e5e2;
        overflow-x: hidden;
      }
      .texture-overlay {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
        pointer-events: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 5; /* Lowered from 50 to 5 to avoid covering content */
        opacity: 0.15;
        mix-blend-mode: overlay;
      }
      ::selection {
        background-color: #2e4535;
        color: #d4c5a3;
      }
    </style>

}
